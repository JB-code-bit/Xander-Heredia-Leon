<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Xander Heredia-Leon</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Inter', sans-serif;
overflow-x:hidden;
}

/* NAVBAR */

nav{
position:absolute;
top:0;
width:100%;
display:flex;
justify-content:center;
gap:50px;
padding:35px 0;
font-size:13px;
letter-spacing:2px;
z-index:10;
}

nav a{
text-decoration:none;
color:white;
}

/* HERO */

.hero{
padding-top:170px;
background:url("images/images/landing/IMG_0900.PNG") center/cover no-repeat;
min-height:100vh;
display:flex;
flex-direction:column;
align-items:center;
text-align:center;
position:relative;
color:white;
}

/* OVERLAY */

.hero::before{
content:"";
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.35);
z-index:0;
}

/* TITLE */

.hero h1{
font-family:'Playfair Display', serif;
font-size:72px;
margin-bottom:40px;
position:relative;
z-index:5;
}

/* CONTROLS */

.controls{
display:flex;
gap:20px;
margin-bottom:20px;
z-index:5;
}

.controls button{
padding:10px 18px;
border:none;
background:white;
color:black;
cursor:pointer;
}

/* ROPE */

.rope{
position:absolute;
top:260px;
left:0;
width:100%;
height:30px;
background-image:url("images/images/landing/12Z_2103.w011.n001.500A.p15.500.jpg");
background-repeat:repeat-x;
background-size:auto 30px;
z-index:2;
pointer-events:none;
}

/* GALLERY */

.gallery{
display:flex;
gap:80px;
overflow-x:auto;
width:100%;
padding:140px 80px;
scroll-behavior:smooth;
z-index:3;
}

.gallery::-webkit-scrollbar{
display:none;
}

/* PHOTO HOLDER */

.photo{
position:relative;
flex-shrink:0;
}

/* POLAROID */

.polaroid{

width:250px;
height:370px;

background:white;

padding:15px 15px 40px 15px;

box-shadow:
0 12px 30px rgba(0,0,0,0.5),
0 20px 50px rgba(0,0,0,0.4);

border-radius:2px;

position:relative;

overflow:hidden;

}

/* FILM AREA */

.placeholder{

width:100%;
height:100%;

background:
radial-gradient(circle at center, #1a1a1a 0%, #000000 80%);

position:relative;

animation:develop 6s ease-in-out infinite;

}

/* FILM GRAIN */

.placeholder::after{

content:"";

position:absolute;
top:0;
left:0;
width:100%;
height:100%;

background-image:url("https://grainy-gradients.vercel.app/noise.svg");

opacity:0.2;

mix-blend-mode:overlay;

}

/* DEVELOP EFFECT */

@keyframes develop{

0%{
opacity:0.15;
filter:blur(2px) contrast(0.7);
}

30%{
opacity:0.45;
filter:blur(1.5px) contrast(0.9);
}

60%{
opacity:0.8;
filter:blur(1px) contrast(1);
}

80%{
opacity:0.6;
filter:blur(1.5px) contrast(0.9);
}

100%{
opacity:0.15;
filter:blur(2px) contrast(0.7);
}

}

/* PIN */

.pin{

position:absolute;

top:-35px;
left:50%;

transform:translateX(-50%);

width:32px;

z-index:6;

}

</style>

</head>

<body>

<nav>
<a href="index.html">Home</a>
<a href="bio.html">About</a>
<a href="gallery.html">Portfolio</a>
</nav>

<section class="hero">

<h1>Xander Heredia-Leon</h1>

<div class="controls">
<button onclick="scrollLeft()">◀</button>
<button onclick="scrollRight()">▶</button>
</div>

<div class="rope"></div>

<div class="gallery" id="gallery"></div>

</section>

<script>

const gallery=document.getElementById("gallery")

/* CREATE 200 POLAROIDS */

for(let i=0;i<200;i++){

const photo=document.createElement("div")
photo.className="photo"

let rotation=(Math.random()*6)-3
let swingSpeed=5 + Math.random()*4
let swingAngle=1 + Math.random()*3

photo.style.transform=`rotate(${rotation}deg)`
photo.style.animation=`swing${i} ${swingSpeed}s ease-in-out infinite`

const style=document.createElement("style")

style.innerHTML=`

@keyframes swing${i}{
0%{ transform:rotate(${rotation}deg); }
50%{ transform:rotate(${rotation + swingAngle}deg); }
100%{ transform:rotate(${rotation}deg); }
}

`

document.head.appendChild(style)

photo.innerHTML=`

<div class="polaroid">
<div class="placeholder"></div>
</div>

<img class="pin" src="images/images/landing/Adobe Express - file.png">

`

gallery.appendChild(photo)

}

/* ULTRA SMOOTH AUTO SCROLL */

let auto=true
let lastTime=0
let speed=0.18

function autoScroll(time){

if(!lastTime) lastTime=time
let delta=time-lastTime
lastTime=time

if(auto){
gallery.scrollLeft += delta*speed
}

requestAnimationFrame(autoScroll)

}

requestAnimationFrame(autoScroll)

/* SMOOTH MANUAL SCROLL */

function smoothScroll(distance){

let start=gallery.scrollLeft
let duration=700
let startTime=null

function animation(time){

if(!startTime) startTime=time
let progress=time-startTime
let percent=Math.min(progress/duration,1)

gallery.scrollLeft=start+(distance*percent)

if(percent<1){
requestAnimationFrame(animation)
}

}

requestAnimationFrame(animation)

}

function scrollLeft(){
auto=false
smoothScroll(-400)
}

function scrollRight(){
auto=false
smoothScroll(400)
}

</script>

</body>
</html>
