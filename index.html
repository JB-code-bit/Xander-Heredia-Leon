<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Xander Heredia-Leon</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Inter', sans-serif;
}

/* NAVBAR */

nav{
position:absolute;
top:0;
width:100%;
display:flex;
justify-content:center;
gap:50px;
padding:35px 0;
font-size:13px;
letter-spacing:2px;
z-index:10;
}

nav a{
text-decoration:none;
color:white;
}

/* HERO */

.hero{
padding-top:170px;
background:url("images/images/landing/IMG_0900.PNG") center/cover no-repeat;
min-height:100vh;
display:flex;
flex-direction:column;
align-items:center;
text-align:center;
position:relative;
color:white;
}

/* DARK OVERLAY */

.hero::before{
content:"";
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.35);
z-index:0;
}

/* NAME */

.hero h1{
font-family:'Playfair Display', serif;
font-size:72px;
margin-bottom:120px;
position:relative;
z-index:2;
}

/* GALLERY */

.gallery{
position:relative;
display:flex;
justify-content:center;
gap:90px;
width:100%;
z-index:2;
}

/* ROPE IMAGE */

.rope{
position:absolute;
top:15px;
left:0;
width:100%;
z-index:1;
pointer-events:none;
}

/* PHOTO WRAPPER */

.photo{
position:relative;
}

/* PHOTO */

.photo img:first-child{
width:250px;
aspect-ratio:2/3;
object-fit:cover;
border:8px solid white;
box-shadow:0 20px 40px rgba(0,0,0,0.5);
margin-top:60px;
position:relative;
z-index:2;
}

/* CLOTHESPIN */

.pin{
position:absolute;
top:5px;
left:50%;
transform:translateX(-50%);
width:32px;
z-index:3;
pointer-events:none;
}

/* ROTATION */

.photo:nth-child(1){
transform:rotate(-4deg);
}

.photo:nth-child(2){
transform:rotate(2deg);
}

.photo:nth-child(3){
transform:rotate(-2deg);
}

</style>

</head>

<body>

<nav>
<a href="index.html">Home</a>
<a href="bio.html">About</a>
<a href="gallery.html">Portfolio</a>
</nav>

<section class="hero">

<h1>Xander Heredia-Leon</h1>

<div class="gallery">

<img class="rope" src="images/images/landing/12Z_2103.w011.n001.500A.p15.500.jpg">

<div class="photo">
<img src="images/images/landing/IMG_8904_4headshot.jpg">
<img class="pin" src="images/images/landing/Adobe Express - file.png">
</div>

<div class="photo">
<img src="images/images/landing/IMG_8916.jpg">
<img class="pin" src="images/images/landing/Adobe Express - file.png">
</div>

<div class="photo">
<img src="images/images/landing/IMG_9018.jpg">
<img class="pin" src="images/images/landing/Adobe Express - file.png">
</div>

</div>

</section>

</body>
</html>
