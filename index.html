<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Xander Heredia-Leon</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Inter', sans-serif;
color:#222;
}

/* NAVBAR */

nav{
position:absolute;
top:0;
width:100%;
display:flex;
justify-content:center;
gap:50px;
padding:35px 0;
font-size:13px;
letter-spacing:2px;
z-index:3;
}

nav a{
text-decoration:none;
color:white;
}

/* HERO */

.hero{
padding-top:140px;
background:url("images/images/landing/IMG_0900.PNG") center/cover no-repeat;
display:flex;
flex-direction:column;
align-items:center;
text-align:center;
position:relative;
color:white;
min-height:100vh;
}

/* DARK OVERLAY */

.hero::before{
content:"";
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.35);
z-index:0;
}

/* NAME */

.hero h1{
font-family:'Playfair Display', serif;
font-size:72px;
font-weight:400;
margin:0 0 80px 0;
position:relative;
z-index:2;
}

/* GALLERY */

.gallery{
position:relative;
display:flex;
justify-content:center;
gap:70px;
z-index:2;
}

/* CLOTHESLINE */

.gallery::before{
content:"";
position:absolute;
top:-30px;
left:10%;
width:80%;
height:4px;
background:#e5e5e5;
}

/* PHOTO WRAPPER */

.photo{
position:relative;
}

/* PHOTO */

.photo img{
width:260px;
aspect-ratio:2/3;
object-fit:cover;
border:8px solid white;
box-shadow:0 15px 30px rgba(0,0,0,0.45);
}

/* CLOTHESPIN */

.photo::before{
content:"";
position:absolute;
top:-35px;
left:50%;
transform:translateX(-50%);
width:18px;
height:30px;
background:#d6a77a;
border-radius:3px;
box-shadow:0 4px 8px rgba(0,0,0,0.4);
}

/* ROTATION FOR HANGING LOOK */

.photo:nth-child(1){
transform:rotate(-4deg);
}

.photo:nth-child(2){
transform:rotate(2deg);
}

.photo:nth-child(3){
transform:rotate(-2deg);
}

/* MOBILE */

@media(max-width:900px){

.hero h1{
font-size:42px;
}

.gallery{
flex-direction:column;
align-items:center;
gap:40px;
}

.gallery::before{
display:none;
}

}

</style>

</head>

<body>

<nav>
<a href="index.html">Home</a>
<a href="bio.html">About</a>
<a href="gallery.html">Portfolio</a>
</nav>

<section class="hero">

<h1>Xander Heredia-Leon</h1>

<div class="gallery">

<div class="photo">
<img src="images/images/landing/IMG_8904_4headshot.jpg">
</div>

<div class="photo">
<img src="images/images/landing/IMG_8916.jpg">
</div>

<div class="photo">
<img src="images/images/landing/IMG_9018.jpg">
</div>

</div>

</section>

</body>
</html>
