<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Xander Heredia-Leon</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>

body{
margin:0;
background:#f5f5f5;
font-family:'Inter', sans-serif;
color:#222;
}

/* NAVBAR */

nav{
display:flex;
justify-content:center;
gap:50px;
padding:35px 0;
font-size:13px;
letter-spacing:2px;
}

nav a{
text-decoration:none;
color:#666;
}

/* HERO TEXT */

.hero{
text-align:center;
margin-top:30px;
margin-bottom:70px;
}

.hero h1{
font-family:'Playfair Display', serif;
font-size:72px;
font-weight:400;
margin:0;
}

.hero p{
font-family:'Playfair Display', serif;
font-style:italic;
font-size:24px;
color:#777;
margin-top:8px;
}

/* IMAGE GRID */

.gallery{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:60px;
width:75%;
margin:auto;
padding-bottom:100px;
}

.gallery img{
width:100%;
aspect-ratio:2/3;
object-fit:cover;
transition:transform .4s ease;
}

.gallery img:hover{
transform:scale(1.05);
}

/* MOBILE */

@media(max-width:900px){

.gallery{
grid-template-columns:1fr;
width:90%;
gap:30px;
}

.hero h1{
font-size:44px;
}

}

</style>

</head>

<body>

<nav>
<a href="index.html">Home</a>
<a href="bio.html">About</a>
<a href="gallery.html">Portfolio</a>
</nav>

<section class="hero">

<h1>Xander Heredia-Leon</h1>
<p>Visionary of Style</p>

</section>

<section class="gallery">

<img src="images/landing/home1.jpg">
<img src="images/landing/home2.jpg">
<img src="images/landing/home3.jpg">

</section>

</body>

</html>
