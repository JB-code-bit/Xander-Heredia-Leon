<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Xander Heredia-Leon</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>

body{
margin:0;
background:#f7f7f7;
font-family:'Inter', sans-serif;
color:#333;
}

/* NAV */

nav{
display:flex;
justify-content:center;
gap:40px;
padding:30px 0;
font-size:14px;
letter-spacing:1px;
}

nav a{
text-decoration:none;
color:#555;
}

/* NAME */

.hero{
text-align:center;
margin-top:20px;
}

.hero h1{
font-family:'Playfair Display', serif;
font-size:64px;
font-weight:400;
margin:10px 0;
}

.hero p{
font-family:'Playfair Display', serif;
font-style:italic;
font-size:22px;
color:#666;
margin-bottom:60px;
}

/* IMAGE ROW */

.gallery{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:40px;
width:80%;
margin:auto;
}

.gallery img{
width:100%;
height:520px;
object-fit:cover;
}

@media(max-width:900px){

.gallery{
grid-template-columns:1fr;
}

.hero h1{
font-size:42px;
}

}

</style>

</head>

<body>

<nav>
<a href="index.html">Home</a>
<a href="bio.html">About</a>
<a href="gallery.html">Portfolio</a>
</nav>

<section class="hero">

<h1>Xander Heredia-Leon</h1>
<p>Visionary of Style</p>

</section>

<section class="gallery">

<img src="images/landing/home1.jpg">
<img src="images/landing/home2.jpg">
<img src="images/landing/home3.jpg">

</section>

</body>

</html>
