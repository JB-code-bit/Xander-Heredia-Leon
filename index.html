<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Xander Heredia-Leon</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Inter', sans-serif;
color:#222;
}

/* NAVBAR */

nav{
position:absolute;
top:0;
width:100%;
display:flex;
justify-content:center;
gap:50px;
padding:35px 0;
font-size:13px;
letter-spacing:2px;
z-index:2;
}

nav a{
text-decoration:none;
color:white;
}

/* HERO WITH GRASS WALL */

.hero{
height:100vh;
background:url("images/images/landing/IMG_0900.PNG") center/cover no-repeat;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
position:relative;
color:white;
}

/* DARK OVERLAY */

.hero::before{
content:"";
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.35);
}

.hero h1{
font-family:'Playfair Display', serif;
font-size:72px;
font-weight:400;
margin:0;
position:relative;
z-index:1;
}

.hero p{
font-family:'Playfair Display', serif;
font-style:italic;
font-size:24px;
margin-top:10px;
position:relative;
z-index:1;
}

/* PHOTO GRID BELOW */

.gallery{
background:#f5f5f5;
display:grid;
grid-template-columns:repeat(3,1fr);
gap:60px;
width:75%;
margin:auto;
padding:100px 0;
}

.gallery img{
width:100%;
aspect-ratio:2/3;
object-fit:cover;
transition:transform .4s ease;
}

.gallery img:hover{
transform:scale(1.05);
}

/* MOBILE */

@media(max-width:900px){

.gallery{
grid-template-columns:1fr;
width:90%;
gap:30px;
}

.hero h1{
font-size:44px;
}

}

</style>

</head>

<body>

<nav>
<a href="index.html">Home</a>
<a href="bio.html">About</a>
<a href="gallery.html">Portfolio</a>
</nav>

<section class="hero">

<h1>Xander Heredia-Leon</h1>
<p>Visionary of Style</p>

</section>

<section class="gallery">

<img src="images/landing/IMG_8904_4headshot.jpg">
<img src="images/landing/IMG_8916.jpg">
<img src="images/landing/IMG_9018.jpg">

</section>

</body>

</html>
