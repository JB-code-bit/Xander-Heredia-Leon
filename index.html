<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>Xander Heredia-Leon | Portfolio</title>

<style>

body{
margin:0;
font-family:Arial;
color:white;
background:#0b0b0b;
}

.hero{
height:100vh;
background-image:url("images/landing/grasswall.jpg");
background-size:cover;
background-position:center;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
position:relative;
text-align:center;
}

.hero h1{
font-size:60px;
background:rgba(0,0,0,0.6);
padding:20px 40px;
border-radius:10px;
}

nav{
position:absolute;
bottom:40px;
display:flex;
gap:30px;
}

nav a{
text-decoration:none;
color:white;
background:rgba(0,0,0,0.6);
padding:12px 20px;
border-radius:8px;
}

.clothesline{
background:#111;
padding:70px;
text-align:center;
}

.line{
border-top:3px solid white;
width:80%;
margin:auto;
}

.photos{
display:flex;
justify-content:center;
gap:50px;
margin-top:-35px;
flex-wrap:wrap;
}

.photo{
position:relative;
animation:sway 4s ease-in-out infinite;
}

.photo img{
width:260px;
border:8px solid white;
cursor:pointer;
}

.clip{
width:20px;
height:20px;
background:#c79b63;
position:absolute;
top:-15px;
left:50%;
transform:translateX(-50%);
}

@keyframes sway{
0%{transform:rotate(-2deg)}
50%{transform:rotate(2deg)}
100%{transform:rotate(-2deg)}
}

.lightbox{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
justify-content:center;
align-items:center;
}

.lightbox img{
max-width:90%;
max-height:90%;
}

</style>

</head>

<body>

<section class="hero">

<h1>Xander Heredia-Leon</h1>

<nav>
<a href="gallery.html">Gallery</a>
<a href="bio.html">Biography</a>
</nav>

</section>

<section class="clothesline">

<div class="line"></div>

<div class="photos">

<div class="photo">
<div class="clip"></div>
<img src="images/landing/home1.jpg" onclick="openLightbox(this)">
</div>

<div class="photo">
<div class="clip"></div>
<img src="images/landing/home2.jpg" onclick="openLightbox(this)">
</div>

<div class="photo">
<div class="clip"></div>
<img src="images/landing/home3.jpg" onclick="openLightbox(this)">
</div>

</div>

</section>

<div id="lightbox" class="lightbox" onclick="closeLightbox()">
<img id="lightbox-img">
</div>

<script>

function openLightbox(img){
document.getElementById("lightbox").style.display="flex"
document.getElementById("lightbox-img").src=img.src
}

function closeLightbox(){
document.getElementById("lightbox").style.display="none"
}

</script>

</body>
</html>
