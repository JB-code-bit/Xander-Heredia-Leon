<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Xander Heredia-Leon</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Inter', sans-serif;
background:black;
color:white;
}

/* NAVBAR */

nav{
position:absolute;
top:0;
width:100%;
display:flex;
justify-content:center;
gap:50px;
padding:35px 0;
font-size:13px;
letter-spacing:2px;
z-index:10;
}

nav a{
text-decoration:none;
color:white;
}

/* HERO */

.hero{
padding-top:170px;
background:url("images/images/landing/IMG_0900.PNG") center/cover no-repeat;
min-height:100vh;
display:flex;
flex-direction:column;
align-items:center;
text-align:center;
position:relative;
}

/* OVERLAY */

.hero::before{
content:"";
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.35);
z-index:0;
}

/* NAME */

.hero h1{
font-family:'Playfair Display', serif;
font-size:72px;
margin-bottom:70px;
position:relative;
z-index:2;
}

/* CATEGORY BUTTONS */

.categories{
display:flex;
gap:15px;
margin-bottom:40px;
z-index:3;
flex-wrap:wrap;
justify-content:center;
}

.categories button{
padding:8px 18px;
border:none;
background:white;
color:black;
font-size:12px;
letter-spacing:1px;
cursor:pointer;
border-radius:4px;
}

/* CLOTHESLINE GALLERY */

.gallery{
position:relative;
display:flex;
gap:90px;
width:100%;
overflow-x:auto;
padding:40px 60px;
scroll-behavior:smooth;
z-index:2;
}

/* ROPE */

.gallery::before{
content:"";
position:absolute;
top:15px;
left:0;
width:100%;
height:18px;
background:url("images/images/landing/12Z_2103.w011.n001.500A.p15.500.jpg") center/cover no-repeat;
z-index:1;
}

/* PHOTO WRAPPER */

.photo{
position:relative;
transition:transform .3s ease;
cursor:pointer;
}

/* POLAROID PHOTO */

.photo img:first-child{
width:250px;
aspect-ratio:2/3;
object-fit:cover;
background:white;
padding:10px 10px 40px 10px;
box-shadow:0 20px 40px rgba(0,0,0,0.6);
margin-top:60px;
position:relative;
z-index:2;
}

/* BLACK PLACEHOLDER */

.placeholder{
width:250px;
height:370px;
background:black;
margin-top:60px;
box-shadow:0 20px 40px rgba(0,0,0,0.6);
}

/* CLOTHESPIN */

.pin{
position:absolute;
top:0;
left:50%;
transform:translateX(-50%);
width:32px;
z-index:5;
pointer-events:none;
transition:.3s;
}

/* PHOTO ROTATION */

.photo:nth-child(odd){
transform:rotate(-3deg);
}

.photo:nth-child(even){
transform:rotate(2deg);
}

/* CLICK ANIMATION */

.photo.active img:first-child{
transform:translateY(15px) scale(1.6);
z-index:20;
}

.photo.active .pin{
transform:translate(-50%, -25px);
}

</style>

</head>

<body>

<nav>
<a href="index.html">Home</a>
<a href="bio.html">About</a>
<a href="gallery.html">Portfolio</a>
</nav>

<section class="hero">

<h1>Xander Heredia-Leon</h1>

<div class="categories">
<button onclick="scrollToCategory('shirtless')">Shirtless</button>
<button onclick="scrollToCategory('headshots')">Headshots</button>
<button onclick="scrollToCategory('commercial')">Commercial</button>
<button onclick="scrollToCategory('fullbody')">Full Body</button>
<button onclick="scrollToCategory('fashion')">Fashion</button>
<button onclick="scrollToCategory('other')">Other</button>
</div>

<div class="gallery">

<!-- HEADSHOTS -->

<div class="photo headshots" id="headshots">
<img src="images/images/landing/IMG_8904_4headshot.jpg">
<img class="pin" src="images/images/landing/Adobe Express - file.png">
</div>

<!-- COMMERCIAL -->

<div class="photo commercial" id="commercial">
<img src="images/images/landing/IMG_8916.jpg">
<img class="pin" src="images/images/landing/Adobe Express - file.png">
</div>

<!-- FASHION -->

<div class="photo fashion" id="fashion">
<img src="images/images/landing/IMG_9018.jpg">
<img class="pin" src="images/images/landing/Adobe Express - file.png">
</div>

<!-- EMPTY SLOT -->

<div class="photo fashion">
<div class="placeholder"></div>
<img class="pin" src="images/images/landing/Adobe Express - file.png">
</div>

<div class="photo fashion">
<div class="placeholder"></div>
<img class="pin" src="images/images/landing/Adobe Express - file.png">
</div>

</div>

</section>

<script>

/* CLICK PHOTO ANIMATION */

document.querySelectorAll(".photo").forEach(photo=>{
photo.addEventListener("click",()=>{
photo.classList.toggle("active");
});
});

/* SCROLL TO CATEGORY */

function scrollToCategory(category){

const section = document.getElementById(category);

if(section){
section.scrollIntoView({
behavior:"smooth",
inline:"start"
});
}

}

</script>

</body>
</html>
