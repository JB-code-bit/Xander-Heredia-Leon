```html
<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Xander Heredia-Leon</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Inter', sans-serif;
}

/* NAVBAR */

nav{
position:absolute;
top:0;
width:100%;
display:flex;
justify-content:center;
gap:50px;
padding:35px 0;
font-size:13px;
letter-spacing:2px;
z-index:10;
}

nav a{
text-decoration:none;
color:white;
}

/* HERO */

.hero{
padding-top:170px;
background:url("images/images/landing/IMG_0900.PNG") center/cover no-repeat;
min-height:100vh;
display:flex;
flex-direction:column;
align-items:center;
text-align:center;
position:relative;
color:white;
}

/* DARK OVERLAY */

.hero::before{
content:"";
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.35);
z-index:0;
}

/* NAME */

.hero h1{
font-family:'Playfair Display', serif;
font-size:72px;
margin-bottom:80px;
position:relative;
z-index:2;
}

/* SCROLL BUTTONS */

.controls{
display:flex;
gap:20px;
margin-bottom:30px;
z-index:2;
}

.controls button{
padding:10px 18px;
border:none;
background:white;
color:black;
cursor:pointer;
}

/* GALLERY */

.gallery{

display:flex;
gap:80px;
width:100%;
overflow-x:auto;
padding:40px 80px;
scroll-behavior:smooth;
z-index:2;

/* ROPE BACKGROUND (FIXED) */

background-image:url("images/images/landing/12Z_2103.w011.n001.500A.p15.500.jpg");
background-repeat:repeat-x;
background-position:top;
background-size:auto 18px;

}

/* PHOTO */

.photo{
position:relative;
}

/* POLAROID PLACEHOLDER */

.placeholder{
width:250px;
height:370px;
background:black;
margin-top:60px;
box-shadow:0 20px 40px rgba(0,0,0,0.6);
}

/* PIN */

.pin{
position:absolute;
top:-8px;
left:50%;
transform:translateX(-50%);
width:32px;
z-index:5;
}

/* ROTATION */

.photo:nth-child(odd){
transform:rotate(-3deg);
}

.photo:nth-child(even){
transform:rotate(2deg);
}

</style>

</head>

<body>

<nav>
<a href="index.html">Home</a>
<a href="bio.html">About</a>
<a href="gallery.html">Portfolio</a>
</nav>

<section class="hero">

<h1>Xander Heredia-Leon</h1>

<div class="controls">
<button onclick="scrollLeft()">◀</button>
<button onclick="scrollRight()">▶</button>
</div>

<div class="gallery" id="gallery"></div>

</section>

<script>

/* GENERATE 200 POLAROIDS */

const gallery = document.getElementById("gallery")

for(let i=0;i<200;i++){

const photo = document.createElement("div")
photo.className="photo"

photo.innerHTML = `
<div class="placeholder"></div>
<img class="pin" src="images/images/landing/Adobe Express - file.png">
`

gallery.appendChild(photo)

}

/* AUTO SCROLL */

let auto=true

function autoScroll(){

if(!auto) return

gallery.scrollLeft += 0.4

requestAnimationFrame(autoScroll)

}

autoScroll()

/* STOP AUTOSCROLL */

gallery.addEventListener("wheel",()=>auto=false)
gallery.addEventListener("mouseenter",()=>auto=false)
gallery.addEventListener("touchstart",()=>auto=false)

/* BUTTON SCROLL */

function scrollLeft(){
auto=false
gallery.scrollLeft -= 600
}

function scrollRight(){
auto=false
gallery.scrollLeft += 600
}

</script>

</body>
</html>
```
