<!DOCTYPE html>

<html>

<head>

<meta charset="UTF-8">
<title>Portfolio Admin</title>

<style>

body{
margin:0;
font-family:Arial;
background:url("images/IMG_0900.PNG") center/cover fixed;
color:white;
}

/* OVERLAY */

.overlay{
background:rgba(0,0,0,.8);
min-height:100vh;
padding:40px;
}

/* HEADER */

.header{
display:flex;
flex-wrap:wrap;
justify-content:space-between;
align-items:center;
margin-bottom:30px;
gap:10px;
}

h1{
margin:0;
}

/* SEARCH */

.search{

padding:10px;
border:none;
border-radius:5px;

}

/* CATEGORY FILTER */

select{

padding:10px;
border:none;
border-radius:5px;

}

/* DROP ZONE */

.dropzone{

border:3px dashed white;
padding:25px;
text-align:center;
margin-bottom:30px;
cursor:pointer;

}

/* GRID */

.grid{

display:grid;
grid-template-columns:repeat(auto-fill,200px);
gap:20px;
justify-content:center;

}

/* CARD */

.card{

background:#111;
border-radius:10px;
overflow:hidden;
box-shadow:0 10px 30px rgba(0,0,0,.6);
transition:.3s;

}

.card:hover{

transform:scale(1.05);

}

/* IMAGE */

.card img{

width:100%;
height:200px;
object-fit:cover;

}

/* CONTROLS */

.controls{

padding:10px;
text-align:center;

}

.controls input{

width:90%;
padding:5px;
margin-bottom:5px;

}

.controls button{

margin:3px;
padding:6px 10px;
border:none;
cursor:pointer;

}

.hide{

background:#444;
color:white;

}

.delete{

background:#ff4d4d;
color:white;

}

/* SAVE BUTTON */

.save{

margin-top:30px;
padding:12px 20px;
font-size:16px;
cursor:pointer;
border:none;
background:white;
color:black;

}

</style>

</head>

<body>

<div class="overlay">

<div class="header">

<h1>Portfolio Admin</h1>

<input class="search" id="search" placeholder="Search keywords">

<select id="filter">

<option value="all">All Categories</option>
<option value="headshot">Headshot</option>
<option value="waistup">Waist Up</option>
<option value="posing">Posing</option>
<option value="fullbody">Full Body</option>
<option value="shirtless">Shirtless</option>

</select>

</div>

<div class="dropzone" id="dropzone">
Drag Photos Here To Add
</div>

<div id="grid" class="grid"></div>

<button class="save" onclick="downloadJSON()">
Download Updated images.json
</button>

</div>

<script>

let images=[]

async function loadImages(){

try{

const res=await fetch("data/images.json")
images=await res.json()

}catch{

images=[]

}

display()

}

loadImages()

const grid=document.getElementById("grid")

function display(){

grid.innerHTML=""

const search=document.getElementById("search").value.toLowerCase()
const filter=document.getElementById("filter").value

images.forEach((img,index)=>{

if(search && !img.keywords?.toLowerCase().includes(search)) return
if(filter!=="all" && img.category!==filter) return

const card=document.createElement("div")
card.className="card"

card.innerHTML=`

<img src="${img.src}">

<div class="controls">

<input value="${img.keywords||""}" placeholder="keywords">

<button class="hide">${img.visible?"Hide":"Show"}</button>

<button class="delete">Delete</button>

</div>

`

const keywordInput=card.querySelector("input")

keywordInput.oninput=()=>{
images[index].keywords=keywordInput.value
}

const hideBtn=card.querySelector(".hide")

hideBtn.onclick=()=>{
images[index].visible=!images[index].visible
display()
}

const delBtn=card.querySelector(".delete")

delBtn.onclick=()=>{
images.splice(index,1)
display()
}

grid.appendChild(card)

})

}

/* SEARCH */

document.ge
