<!DOCTYPE html>
<html>

<head>

<title>Admin Upload</title>

<style>

body{

font-family:Arial;
background:#111;
color:white;
text-align:center;
padding:40px;

}

select,input{

margin:15px;
padding:8px;

}

.preview{

display:flex;
flex-wrap:wrap;
gap:20px;
justify-content:center;

}

.preview img{

width:120px;
border:4px solid white;

}

</style>

</head>

<body>

<h1>Upload Portfolio Photos</h1>

<select id="category">

<option value="headshot">Headshot</option>
<option value="waistup">Waist Up</option>
<option value="posing">Posing</option>
<option value="fullbody">Full Body</option>
<option value="shirtless">Shirtless</option>

</select>

<input type="file" id="upload" multiple>

<div class="preview" id="preview"></div>

<script>

let images=JSON.parse(localStorage.getItem("portfolioImages"))||[]

const upload=document.getElementById("upload")

upload.addEventListener("change",function(){

const cat=document.getElementById("category").value

const files=this.files

for(let file of files){

const reader=new FileReader()

reader.onload=function(e){

images.push({

src:e.target.result,

category:cat

})

localStorage.setItem("portfolioImages",JSON.stringify(images))

}

reader.readAsDataURL(file)

}

})

</script>

</body>

</html>
