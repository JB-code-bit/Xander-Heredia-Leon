<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>Portfolio Admin</title>

<style>

body{
margin:0;
font-family:Arial;
background:url("images/IMG_0900.PNG") center/cover fixed;
color:white;
}

.overlay{
background:rgba(0,0,0,.85);
min-height:100vh;
padding:40px;
}

h1{
margin-bottom:20px;
}

.dropzone{
border:3px dashed white;
padding:50px;
text-align:center;
margin-bottom:30px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,200px);
gap:20px;
}

.card{
background:#111;
padding:10px;
}

.card img{
width:100%;
height:200px;
object-fit:cover;
}

button{
margin-top:5px;
padding:6px 10px;
border:none;
cursor:pointer;
}

</style>
</head>

<body>

<div class="overlay">

<h1>Upload Photos</h1>

<div class="dropzone" id="dropzone">
Drag Photos Here
</div>

<div class="grid" id="grid"></div>

</div>

<script>

let images=[]

const grid=document.getElementById("grid")

async function loadImages(){

try{
const res=await fetch("data/images.json")
images=await res.json()
}catch{
images=[]
}

display()

}

loadImages()

function display(){

grid.innerHTML=""

images.forEach(img=>{

const card=document.createElement("div")

card.className="card"

card.innerHTML=`
<img src="${img.src}">
<p>${img.category}</p>
`

grid.appendChild(card)

})

}

const dropzone=document.getElementById("dropzone")

dropzone.addEventListener("dragover",(e)=>{
e.preventDefault()
})

dropzone.addEventListener("drop",(e)=>{

e.preventDefault()

const files=e.dataTransfer.files

upload(files)

})

async function upload(files){

for(let file of files){

const reader=new FileReader()

reader.onload=async function(e){

const base64=e.target.result.split(",")[1]

await fetch("https://api.github.com/repos/JB-code-bit/Xander-Heredia-Leon/dispatches",{

method:"POST",

headers:{
"Accept":"application/vnd.github+json",
"Content-Type":"application/json"
},

body:JSON.stringify({

event_type:"upload-file",

client_payload:{
folder:"images/uploads",
filename:file.name,
content:base64
}

})

})

images.push({

src:"images/uploads/"+file.name,
category:"headshot"

})

display()

}

reader.readAsDataURL(file)

}

}

</script>

</body>
</html>
