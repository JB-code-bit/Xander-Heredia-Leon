<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>Admin Upload</title>

<style>

body{
font-family:Arial;
background:#111;
color:white;
text-align:center;
padding:40px;
}

h1{
margin-bottom:30px;
}

select{
padding:10px;
margin-bottom:20px;
}

.dropzone{
width:500px;
height:200px;
margin:20px auto;
border:3px dashed white;
display:flex;
align-items:center;
justify-content:center;
font-size:18px;
transition:.3s;
}

.dropzone.dragover{
background:#222;
border-color:#00ffcc;
}

.preview{
display:flex;
flex-wrap:wrap;
gap:15px;
justify-content:center;
margin-top:30px;
}

.preview img{
width:120px;
border:4px solid white;
}

</style>

</head>

<body>

<h1>Upload Portfolio Photos</h1>

<select id="category">

<option value="headshot">Headshot</option>
<option value="waistup">Waist Up</option>
<option value="posing">Posing</option>
<option value="fullbody">Full Body</option>
<option value="shirtless">Shirtless</option>

</select>

<div class="dropzone" id="dropzone">
Drag Photos Here
</div>

<div class="preview" id="preview"></div>

<script>

let images = JSON.parse(localStorage.getItem("portfolioImages")) || []

const dropzone = document.getElementById("dropzone")
const preview = document.getElementById("preview")

function save(){
localStorage.setItem("portfolioImages",JSON.stringify(images))
}

/* DISPLAY */

function displayImages(){

preview.innerHTML=""

images.forEach((img,index)=>{

const box=document.createElement("div")
box.style.border="2px solid white"
box.style.padding="10px"
box.style.width="140px"

const image=document.createElement("img")
image.src=img.src
image.style.width="100%"

const cat=document.createElement("select")

const categories=["headshot","waistup","posing","fullbody","shirtless"]

categories.forEach(c=>{

const option=document.createElement("option")
option.value=c
option.textContent=c

if(c===img.category) option.selected=true

cat.appendChild(option)

})

cat.onchange=function(){
images[index].category=this.value
save()
}

/* KEYWORDS */

const keywords=document.createElement("input")
keywords.placeholder="keywords"
keywords.value=img.keywords || ""

keywords.onchange=function(){
images[index].keywords=this.value
save()
}

/* VISIBILITY */

const show=document.createElement("button")

show.textContent = img.visible===false ? "Hidden" : "Visible"

show.onclick=function(){

images[index].visible = !images[index].visible

save()

displayImages()

}

/* DELETE */

const del=document.createElement("button")

del.textContent="Delete"

del.onclick=function(){

images.splice(index,1)

save()

displayImages()

}

box.appendChild(image)
box.appendChild(cat)
box.appendChild(keywords)
box.appendChild(show)
box.appendChild(del)

preview.appendChild(box)

})

}

displayImages()

/* DRAG EVENTS */

dropzone.addEventListener("dragover",(e)=>{

e.preventDefault()

dropzone.classList.add("dragover")

})

dropzone.addEventListener("dragleave",()=>{

dropzone.classList.remove("dragover")

})

dropzone.addEventListener("drop",(e)=>{

e.preventDefault()

dropzone.classList.remove("dragover")

const files=e.dataTransfer.files

const cat=document.getElementById("category").value

for(let file of files){

const reader=new FileReader()

reader.onload=function(event){

images.push({

src:event.target.result,
category:cat,
keywords:"",
visible:true

})

save()
displayImages()

}

reader.readAsDataURL(file)

}

})

</script>

</body>
</html>
