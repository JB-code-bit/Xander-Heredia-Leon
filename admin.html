<!DOCTYPE html>

<html>

<head>

<meta charset="UTF-8">
<title>Portfolio Admin</title>

<style>

body{
margin:0;
font-family:Arial;
background:url("images/IMG_0900.PNG") center/cover fixed;
color:white;
}

/* DARK OVERLAY */

.overlay{
background:rgba(0,0,0,.75);
min-height:100vh;
padding:40px;
}

/* HEADER */

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:40px;
}

.header h1{
font-size:40px;
}

/* UPLOAD BUTTON */

.upload{

background:white;
color:black;
border:none;
padding:10px 18px;
font-size:16px;
cursor:pointer;
border-radius:6px;

}

/* CATEGORY */

select{

padding:10px;
margin-left:10px;

}

/* GRID */

.grid{

display:grid;
grid-template-columns:repeat(auto-fill,200px);
gap:25px;
justify-content:center;

}

/* CARD */

.card{

background:#111;
border-radius:10px;
overflow:hidden;
box-shadow:0 10px 30px rgba(0,0,0,.6);
transition:.3s;

}

.card:hover{

transform:scale(1.05);

}

/* IMAGE */

.card img{

width:100%;
height:220px;
object-fit:cover;

}

/* CONTROLS */

.controls{

padding:10px;
text-align:center;

}

.controls input{

width:90%;
margin:4px;
padding:6px;

}

.controls button{

margin-top:6px;
padding:6px 10px;
border:none;
cursor:pointer;
}

.delete{

background:#ff4d4d;
color:white;

}

.hide{

background:#444;
color:white;

}

</style>

</head>

<body>

<div class="overlay">

<div class="header">

<h1>Portfolio Admin</h1>

<div>

<input type="file" id="upload" multiple>

<select id="category">

<option value="headshot">Headshot</option>
<option value="waistup">Waist Up</option>
<option value="posing">Posing</option>
<option value="fullbody">Full Body</option>
<option value="shirtless">Shirtless</option>

</select>

</div>

</div>

<div id="grid" class="grid"></div>

</div>

<script>

let images=[]

async function loadImages(){

try{

const res=await fetch("data/images.json")
images=await res.json()

}catch{

images=[]

}

display()

}

loadImages()

const grid=document.getElementById("grid")

function display(){

grid.innerHTML=""

images.forEach((img,index)=>{

const card=document.createElement("div")
card.className="card"

card.innerHTML=`

<img src="${img.src}">

<div class="controls">

<input value="${img.keywords||""}" placeholder="keywords">

<button class="hide">${img.visible?"Hide":"Show"}</button>

<button class="delete">Delete</button>

</div>

`

const keywordInput=card.querySelector("input")
keywordInput.oninput=()=>{

images[index].keywords=keywordInput.value

}

const hideBtn=card.querySelector(".hide")
hideBtn.onclick=()=>{

images[index].visible=!images[index].visible
display()

}

const delBtn=card.querySelector(".delete")
delBtn.onclick=()=>{

images.splice(index,1)
display()

}

grid.appendChild(card)

})

}

/* UPLOAD */

document.getElementById("upload").addEventListener("change",(e)=>{

const files=e.target.files
const cat=document.getElementById("category").value

for(let file of files){

images.push({

src:"images/uploads/"+file.name,
category:cat,
visible:true,
keywords:""

})

}

display()

})

</script>

</body>

</html>
