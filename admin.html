<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>Portfolio Admin</title>

<style>

body{
margin:0;
font-family:Arial;
background:url("images/IMG_0900.PNG") center/cover fixed;
color:white;
}

.overlay{
background:rgba(0,0,0,.85);
min-height:100vh;
padding:40px;
}

.dropzone{
border:3px dashed white;
padding:60px;
text-align:center;
margin-bottom:30px;
}

</style>

</head>

<body>

<div class="overlay">

<h1>Upload Photos</h1>

<div class="dropzone" id="dropzone">

Drag Photos Here

</div>

</div>

<script>

const dropzone=document.getElementById("dropzone")

dropzone.addEventListener("dragover",(e)=>{

e.preventDefault()

})

dropzone.addEventListener("drop",(e)=>{

e.preventDefault()

const files=e.dataTransfer.files

upload(files)

})

async function upload(files){

for(let file of files){

const reader=new FileReader()

reader.onload=async function(e){

const base64=e.target.result.split(",")[1]

await fetch("https://api.github.com/repos/JB-code-bit/Xander-Heredia-Leon/dispatches",{

method:"POST",

headers:{

"Accept":"application/vnd.github+json",

"Content-Type":"application/json"

},

body:JSON.stringify({

event_type:"upload-file",

client_payload:{

folder:"images/uploads",

filename:file.name,

content:base64

}

})

})

}

reader.readAsDataURL(file)

}

}

</script>

</body>
</html>
