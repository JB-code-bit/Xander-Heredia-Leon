<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>Portfolio Admin</title>

<style>

body{
margin:0;
font-family:Arial;
background:url("images/IMG_0900.PNG") center/cover fixed;
color:white;
}

.overlay{
background:rgba(0,0,0,.85);
min-height:100vh;
padding:40px;
}

.dropzone{
border:3px dashed white;
padding:80px;
text-align:center;
font-size:22px;
cursor:pointer;
}

.dropzone.drag{
background:rgba(255,255,255,.2);
}

.status{
margin-top:20px;
font-size:18px;
}

</style>

</head>

<body>

<div class="overlay">

<h1>Upload Photos</h1>

<div class="dropzone" id="dropzone">
Drag Photos Here
</div>

<div class="status" id="status"></div>

</div>

<script>

const dropzone = document.getElementById("dropzone")
const status = document.getElementById("status")

/* HIGHLIGHT BOX */

dropzone.addEventListener("dragover", (e)=>{
e.preventDefault()
dropzone.classList.add("drag")
})

dropzone.addEventListener("dragleave", ()=>{
dropzone.classList.remove("drag")
})

/* DROP FILES */

dropzone.addEventListener("drop", (e)=>{

e.preventDefault()

dropzone.classList.remove("drag")

const files = e.dataTransfer.files

if(files.length === 0){
status.innerText="No files detected"
return
}

status.innerText = "Uploading..."

upload(files)

})

/* UPLOAD FUNCTION */

async function upload(files){

for(let file of files){

const reader = new FileReader()

reader.onload = async function(e){

const base64 = e.target.result.split(",")[1]

try{

await fetch("https://api.github.com/repos/JB-code-bit/Xander-Heredia-Leon/dispatches",{

method:"POST",

headers:{
"Accept":"application/vnd.github+json",
"Content-Type":"application/json",
"User-Agent":"portfolio-admin"
},

body:JSON.stringify({

event_type:"upload-file",

client_payload:{
folder:"images/uploads",
filename:file.name,
content:base64
}

})

})

status.innerText="Upload sent to GitHub Actions"

}catch(err){

status.innerText="Upload failed"

}

}

reader.readAsDataURL(file)

}

}

</script>

</body>
</html>
