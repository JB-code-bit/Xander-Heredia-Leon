<!DOCTYPE html>

<html>

<head>

<meta charset="UTF-8">
<title>Portfolio Admin</title>

<style>

body{
margin:0;
font-family:Arial;
background:url("images/IMG_0900.PNG") center/cover fixed;
color:white;
}

.overlay{
background:rgba(0,0,0,.85);
min-height:100vh;
padding:40px;
}

/* HEADER */

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:30px;
flex-wrap:wrap;
}

.uploadBtn{
background:white;
color:black;
padding:10px 18px;
border:none;
border-radius:6px;
cursor:pointer;
font-size:16px;
}

.uploadInput{
display:none;
}

/* DRAG ZONE */

.dropzone{
border:3px dashed white;
padding:40px;
text-align:center;
margin-bottom:30px;
transition:.3s;
}

.dropzone.dragover{
background:#222;
border-color:#00ffcc;
}

/* GRID */

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,220px);
gap:20px;
justify-content:center;
}

/* PHOTO CARD */

.card{
background:#111;
border-radius:10px;
overflow:hidden;
box-shadow:0 10px 30px rgba(0,0,0,.6);
}

.card img{
width:100%;
height:220px;
object-fit:cover;
}

.controls{
padding:10px;
text-align:center;
}

.controls select,
.controls input{
width:90%;
padding:6px;
margin-bottom:6px;
}

.controls button{
margin:4px;
padding:6px 10px;
border:none;
cursor:pointer;
}

.hide{
background:#444;
color:white;
}

.delete{
background:#ff4d4d;
color:white;
}

.save{
margin-top:30px;
padding:12px 20px;
font-size:16px;
border:none;
cursor:pointer;
background:white;
color:black;
}

</style>

</head>

<body>

<div class="overlay">

<div class="header">

<h1>Portfolio Admin</h1>

<label class="uploadBtn">
➕ Upload Photos
<input type="file" id="upload" class="uploadInput" multiple>
</label>

</div>

<div id="dropzone" class="dropzone">
Drag Photos Here
</div>

<div id="grid" class="grid"></div>

<button class="save" onclick="downloadJSON()">
Download Updated images.json
</button>

</div>

<script>

let images=[]

async function loadImages(){

try{
const res=await fetch("data/images.json")
images=await res.json()
}catch{
images=[]
}

display()

}

loadImages()

const grid=document.getElementById("grid")

function display(){

grid.innerHTML=""

images.forEach((img,index)=>{

const card=document.createElement("div")
card.className="card"

card.innerHTML=`

<img src="${img.src}">

<div class="controls">

<select>

<option value="headshot">Headshot</option>
<option value="waistup">Waist Up</option>
<option value="posing">Posing</option>
<option value="fullbody">Full Body</option>
<option value="shirtless">Shirtless</option>

</select>

<input placeholder="keywords" value="${img.keywords||""}">

<button class="hide">${img.visible?"Hide":"Show"}</button>

<button class="delete">Delete</button>

</div>

`

const select=card.querySelector("select")
select.value=img.category

select.onchange=()=>{
images[index].category=select.value
}

const keywordInput=card.querySelector("input")

keywordInput.oninput=()=>{
images[index].keywords=keywordInput.value
}

const hideBtn=card.querySelector(".hide")

hideBtn.onclick=()=>{
images[index].visible=!images[index].visible
display()
}

const delBtn=card.querySelector(".delete")

delBtn.onclick=()=>{
images.splice(index,1)
display()
}

grid.appendChild(card)

})

}

/* FILE BUTTON */

document.getElementById("upload").addEventListener("change",(e)=>{
addFiles(e.target.files)
})

/* DRAG DROP */

const dropzone=document.getElementById("dropzone")

dropzone.addEventListener("dragover",(e)=>{
e.preventDefault()
dropzone.classList.add("dragover")
})

dropzone.addEventListener("dragleave",()=>{
dropzone.classList.remove("dragover")
})

dropzone.addEventListener("drop",(e)=>{

e.preventDefault()
dropzone.classList.remove("dragover")

addFiles(e.dataTransfer.files)

})

/* UPLOAD TO GITHUB */

async function addFiles(files){

for(let file of files){

const reader=new FileReader()

reader.onload=async function(e){

const base64=e.target.result.split(",")[1]

await fetch("https://api.github.com/repos/YOUR_USERNAME/YOUR_REPO/dispatches",{

method:"POST",

headers:{
"Accept":"application/vnd.github+json",
"Authorization":"token YOUR_TOKEN"
},

body:JSON.stringify({

event_type:"upload-file",

client_payload:{
folder:"images/uploads",
filename:file.name,
content:base64
}

})

})

images.push({

src:"images/uploads/"+file.name,
category:"headshot",
visible:true,
keywords:""

})

display()

}

reader.readAsDataURL(file)

}

}

/* DOWNLOAD JSON */

function downloadJSON(){

const data=JSON.stringify(images,null,2)

const blob=new Blob([data],{type:"application/json"})

const link=document.createElement("a")

link.href=URL.createObjectURL(blob)

link.download="images.json"

link.click()

}

</script>

</body>

</html>
